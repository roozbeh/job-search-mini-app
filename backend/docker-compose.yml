services:

  api:
    build: .
    container_name: jobsearch_api
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    container_name: jobsearch_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - internal
    depends_on:
      - api

  certbot:
    image: certbot/certbot:latest
    container_name: jobsearch_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Run manually: docker compose run --rm certbot certonly ...
    entrypoint: ["sh", "-c", "trap exit TERM; while :; do certbot renew --quiet --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done"]

volumes:
  certbot_www:
  certbot_certs:

networks:
  internal:
    driver: bridge
