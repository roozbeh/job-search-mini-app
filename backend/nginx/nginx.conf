# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name jobsearch.ipronto.net;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — reverse proxy to FastAPI
server {
    listen 443 ssl;
    server_name jobsearch.ipronto.net;

    ssl_certificate     /etc/letsencrypt/live/jobsearch.ipronto.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jobsearch.ipronto.net/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    # Upload limit for résumé PDFs
    client_max_body_size 15M;

    location / {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
