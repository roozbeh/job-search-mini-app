<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Search - n8n Workflow</title>
    <!-- PDF.js library for client-side PDF parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Configure PDF.js worker
        if (typeof pdfjsLib !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input[type="text"],
        input[type="url"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="url"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            min-height: 150px;
            resize: vertical;
            font-family: inherit;
        }

        .file-upload {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
        }

        .file-upload:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }

        .file-upload.dragover {
            background: #e8ebff;
            border-color: #764ba2;
        }

        input[type="file"] {
            display: none;
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .tag {
            background: #667eea;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .tag .remove {
            cursor: pointer;
            font-weight: bold;
            opacity: 0.8;
        }

        .tag .remove:hover {
            opacity: 1;
        }

        .add-input-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .add-input-group input {
            flex: 1;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 14px;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            margin-top: 20px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .salary-range {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .salary-range input {
            flex: 1;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            border: 2px solid #fcc;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .job-card {
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: box-shadow 0.3s;
        }

        .job-card:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .job-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .job-company {
            color: #667eea;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .job-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }

        .job-description {
            margin-top: 15px;
            color: #555;
            line-height: 1.6;
        }

        .job-link {
            display: inline-block;
            margin-top: 15px;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .job-link:hover {
            text-decoration: underline;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .results-count {
            color: #666;
            font-size: 14px;
        }

        .hidden {
            display: none;
        }

        .cv-analysis {
            background: #f8f9ff;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .improvement-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .priority-high {
            color: #c33;
        }

        .priority-medium {
            color: #f90;
        }

        .priority-low {
            color: #3c3;
        }

        .parsing-status {
            color: #667eea;
            font-size: 14px;
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Job Search Assistant</h1>
            <p>Powered by n8n Workflow</p>
        </div>

        <div class="card">
            <div class="form-group">
                <label for="webhookUrl">n8n Webhook URL *</label>
                <input type="url" id="webhookUrl" placeholder="https://your-n8n-instance.com/webhook/..." required>
                <small style="color: #666; display: block; margin-top: 5px;">Enter your n8n workflow webhook URL</small>
            </div>
        </div>

        <div class="card">
            <h2 style="margin-bottom: 20px;">📄 CV Analysis</h2>
            
            <div class="form-group">
                <label>Upload CV (PDF or TXT)</label>
                <div class="file-upload" id="fileUpload">
                    <p>📎 Drop your CV here or click to upload</p>
                    <p style="color: #666; font-size: 14px; margin-top: 5px;">PDF and TXT files supported</p>
                    <input type="file" id="fileInput" accept=".pdf,.txt">
                </div>
                <div id="fileName" style="margin-top: 10px; color: #667eea; font-weight: 500;"></div>
            </div>

            <div style="text-align: center; margin: 20px 0; color: #999;">OR</div>

            <div class="form-group">
                <label for="cvText">Paste CV Content</label>
                <textarea id="cvText" placeholder="Paste your CV content here..."></textarea>
            </div>

            <div id="cvAnalysis" class="hidden"></div>
        </div>

        <div class="card">
            <h2 style="margin-bottom: 20px;">💼 Job Preferences</h2>
            
            <div class="form-group">
                <label>Job Titles</label>
                <div class="add-input-group">
                    <input type="text" id="newJobTitle" placeholder="e.g., Frontend Developer">
                    <button class="btn-small" onclick="addJobTitle()">Add</button>
                </div>
                <div class="tag-container" id="jobTitles"></div>
            </div>

            <div class="form-group">
                <label>Locations</label>
                <div class="add-input-group">
                    <input type="text" id="newLocation" placeholder="e.g., San Francisco, CA">
                    <button class="btn-small" onclick="addLocation()">Add</button>
                </div>
                <div class="tag-container" id="locations"></div>
            </div>

            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="isRemote">
                    <label for="isRemote" style="margin: 0;">Include Remote Jobs</label>
                </div>
            </div>

            <div class="form-group">
                <label>Salary Range (USD/year)</label>
                <div class="salary-range">
                    <input type="number" id="salaryMin" placeholder="Min">
                    <span>—</span>
                    <input type="number" id="salaryMax" placeholder="Max">
                </div>
            </div>

            <button class="btn-primary" onclick="searchJobs()" id="searchBtn">
                🔍 Search Jobs
            </button>
        </div>

        <div id="errorMessage" class="error hidden"></div>

        <div id="results" class="card hidden">
            <div class="results-header">
                <h2>📋 Job Results</h2>
                <div class="results-count" id="resultsCount"></div>
            </div>
            <div id="jobsList"></div>
        </div>
    </div>

    <script>
        let jobTitles = [];
        let locations = [];
        let cvTextContent = '';

        // File upload handling
        const fileUpload = document.getElementById('fileUpload');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');

        fileUpload.addEventListener('click', () => fileInput.click());
        fileUpload.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileUpload.classList.add('dragover');
        });
        fileUpload.addEventListener('dragleave', () => {
            fileUpload.classList.remove('dragover');
        });
        fileUpload.addEventListener('drop', (e) => {
            e.preventDefault();
            fileUpload.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        async function handleFile(file) {
            const isPdf = file.type === 'application/pdf' || file.name.endsWith('.pdf');
            const isTxt = file.type === 'text/plain' || file.name.endsWith('.txt');

            if (!isPdf && !isTxt) {
                showError('Please upload a PDF or TXT file.');
                return;
            }

            fileName.textContent = `📄 ${file.name}`;
            fileName.innerHTML += '<div class="parsing-status">⏳ Parsing file...</div>';

            try {
                if (isTxt) {
                    const text = await file.text();
                    document.getElementById('cvText').value = text;
                    cvTextContent = text;
                    fileName.innerHTML = `📄 ${file.name} <span style="color: #3c3;">✓ Parsed</span>`;
                } else {
                    // Parse PDF client-side using PDF.js
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    
                    let fullText = '';
                    const numPages = pdf.numPages;
                    
                    // Extract text from all pages
                    for (let pageNum = 1; pageNum <= numPages; pageNum++) {
                        const page = await pdf.getPage(pageNum);
                        const textContent = await page.getTextContent();
                        const pageText = textContent.items.map(item => item.str).join(' ');
                        fullText += pageText + '\n';
                    }
                    
                    if (!fullText.trim()) {
                        throw new Error('Could not extract text from PDF. The file might be image-based or corrupted.');
                    }
                    
                    document.getElementById('cvText').value = fullText.trim();
                    cvTextContent = fullText.trim();
                    fileName.innerHTML = `📄 ${file.name} <span style="color: #3c3;">✓ Parsed (${numPages} page${numPages !== 1 ? 's' : ''})</span>`;
                }
            } catch (error) {
                console.error('File parsing error:', error);
                showError('Failed to parse file: ' + error.message);
                fileName.textContent = `📄 ${file.name}`;
            }
        }

        function addJobTitle() {
            const input = document.getElementById('newJobTitle');
            const title = input.value.trim();
            if (title && !jobTitles.includes(title)) {
                jobTitles.push(title);
                renderJobTitles();
                input.value = '';
            }
        }

        function removeJobTitle(title) {
            jobTitles = jobTitles.filter(t => t !== title);
            renderJobTitles();
        }

        function renderJobTitles() {
            const container = document.getElementById('jobTitles');
            container.innerHTML = jobTitles.map(title => `
                <span class="tag">
                    ${title}
                    <span class="remove" onclick="removeJobTitle('${title}')">×</span>
                </span>
            `).join('');
        }

        function addLocation() {
            const input = document.getElementById('newLocation');
            const location = input.value.trim();
            if (location && !locations.includes(location)) {
                locations.push(location);
                renderLocations();
                input.value = '';
            }
        }

        function removeLocation(location) {
            locations = locations.filter(l => l !== location);
            renderLocations();
        }

        function renderLocations() {
            const container = document.getElementById('locations');
            container.innerHTML = locations.map(location => `
                <span class="tag">
                    ${location}
                    <span class="remove" onclick="removeLocation('${location}')">×</span>
                </span>
            `).join('');
        }

        // Allow Enter key to add items
        document.getElementById('newJobTitle').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addJobTitle();
        });

        document.getElementById('newLocation').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addLocation();
        });

        // Update CV text when pasted
        document.getElementById('cvText').addEventListener('input', (e) => {
            cvTextContent = e.target.value;
        });

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
            setTimeout(() => {
                errorDiv.classList.add('hidden');
            }, 5000);
        }

        async function searchJobs() {
            const webhookUrl = document.getElementById('webhookUrl').value.trim();
            if (!webhookUrl) {
                showError('Please enter the n8n webhook URL');
                return;
            }

            if (jobTitles.length === 0) {
                showError('Please add at least one job title');
                return;
            }

            // Get CV text (either from textarea or file)
            const cvTextFromTextarea = document.getElementById('cvText').value.trim();
            const finalCvText = cvTextFromTextarea || cvTextContent;

            const preferences = {
                jobTitles: jobTitles,
                locations: locations,
                isRemote: document.getElementById('isRemote').checked,
                salaryMin: document.getElementById('salaryMin').value ? parseInt(document.getElementById('salaryMin').value) : null,
                salaryMax: document.getElementById('salaryMax').value ? parseInt(document.getElementById('salaryMax').value) : null,
            };

            const searchBtn = document.getElementById('searchBtn');
            searchBtn.disabled = true;
            searchBtn.textContent = '⏳ Searching...';

            const resultsDiv = document.getElementById('results');
            resultsDiv.classList.add('hidden');
            resultsDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Searching for jobs...</p></div>';

            try {
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        cvText: finalCvText,
                        preferences: preferences,
                    }),
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to search jobs');
                }

                // Display CV analysis if available
                if (data.cvAnalysis) {
                    displayCVAnalysis(data.cvAnalysis);
                }

                // Display job results
                if (data.jobs && Array.isArray(data.jobs)) {
                    displayJobs(data.jobs);
                } else {
                    showError('No jobs found. Try different search criteria.');
                }
            } catch (error) {
                console.error('Search error:', error);
                showError('Failed to search jobs: ' + error.message);
            } finally {
                searchBtn.disabled = false;
                searchBtn.textContent = '🔍 Search Jobs';
            }
        }

        function displayCVAnalysis(analysis) {
            const cvAnalysisDiv = document.getElementById('cvAnalysis');
            if (!analysis) return;

            let html = '<div class="cv-analysis"><h3>📊 CV Analysis Results</h3>';
            
            if (analysis.summary) {
                html += `<p style="margin: 15px 0; line-height: 1.6;">${analysis.summary}</p>`;
            }

            if (analysis.extractedCriteria) {
                html += '<h4 style="margin-top: 20px; margin-bottom: 10px;">Extracted Criteria:</h4>';
                html += `<p><strong>Job Titles:</strong> ${analysis.extractedCriteria.jobTitles?.join(', ') || 'N/A'}</p>`;
                html += `<p><strong>Experience:</strong> ${analysis.extractedCriteria.yearsOfExperience || 'N/A'} years</p>`;
                html += `<p><strong>Locations:</strong> ${analysis.extractedCriteria.preferredLocations?.join(', ') || 'N/A'}</p>`;
            }

            if (analysis.improvements && analysis.improvements.length > 0) {
                html += '<h4 style="margin-top: 20px; margin-bottom: 10px;">Improvement Suggestions:</h4>';
                analysis.improvements.forEach(imp => {
                    const priorityClass = `priority-${imp.priority}`;
                    html += `
                        <div class="improvement-item">
                            <strong class="${priorityClass}">[${imp.priority.toUpperCase()}]</strong> ${imp.title}
                            <p style="margin-top: 5px; color: #666;">${imp.description}</p>
                        </div>
                    `;
                });
            }

            html += '</div>';
            cvAnalysisDiv.innerHTML = html;
            cvAnalysisDiv.classList.remove('hidden');
        }

        function displayJobs(jobs) {
            const resultsDiv = document.getElementById('results');
            const jobsList = document.getElementById('jobsList');
            const resultsCount = document.getElementById('resultsCount');

            resultsCount.textContent = `Found ${jobs.length} job${jobs.length !== 1 ? 's' : ''}`;

            if (jobs.length === 0) {
                jobsList.innerHTML = '<p style="text-align: center; color: #666; padding: 40px;">No jobs found. Try different search criteria.</p>';
            } else {
                jobsList.innerHTML = jobs.map(job => `
                    <div class="job-card">
                        <div class="job-title">${escapeHtml(job.title || 'Unknown Title')}</div>
                        <div class="job-company">${escapeHtml(job.company || 'Unknown Company')}</div>
                        <div class="job-meta">
                            ${job.location ? `<span>📍 ${escapeHtml(job.location)}</span>` : ''}
                            ${job.salary ? `<span>💰 ${escapeHtml(job.salary)}</span>` : ''}
                            ${job.postedDate ? `<span>📅 ${escapeHtml(job.postedDate)}</span>` : ''}
                            ${job.isRemote ? `<span>🌐 Remote</span>` : ''}
                        </div>
                        ${job.description ? `<div class="job-description">${escapeHtml(job.description.substring(0, 300))}${job.description.length > 300 ? '...' : ''}</div>` : ''}
                        ${job.applicationUrl ? `<a href="${escapeHtml(job.applicationUrl)}" target="_blank" class="job-link">Apply Now →</a>` : ''}
                    </div>
                `).join('');
            }

            resultsDiv.classList.remove('hidden');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
